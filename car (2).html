<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Performance 3D Drive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.3);
            padding: 8px; border-radius: 5px; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="ui">FPS Optimized Mode - Use Arrows/WASD</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- FAST SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.5, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setPixelRatio(1); // Standard resolution for speed
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Simple light (No shadows = High FPS)
        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(5, 10, 7);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // --- OPTIMIZED ROAD ---
        const roadGroup = new THREE.Group();
        const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 4000), new THREE.MeshLambertMaterial({ color: 0x333333 }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Use fewer lines for better performance
        for (let i = -2000; i < 2000; i += 40) {
            const line = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 20), new THREE.MeshLambertMaterial({ color: 0xaaaaaa }));
            line.rotation.x = -Math.PI / 2;
            line.position.set(0, 0.02, i);
            scene.add(line);

            // Simple Building Blocks
            const h = 20 + Math.random() * 30;
            const bMat = new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff });
            const box = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), bMat);
            box.position.set(i % 80 === 0 ? -25 : 25, h/2, i);
            scene.add(box);
        }

        // --- SIMPLE CAR ---
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshLambertMaterial({ color: 0xff0000 }));
        body.position.y = 0.6;
        car.add(body);
        
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 2), new THREE.MeshLambertMaterial({ color: 0x222222 }));
        cabin.position.set(0, 1.4, -0.2);
        car.add(cabin);
        scene.add(car);

        // --- FAST CONTROLS ---
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function animate() {
            requestAnimationFrame(animate);

            if (keys['w'] || keys['arrowup']) car.position.z -= 1.0;
            if (keys['s'] || keys['arrowdown']) car.position.z += 1.0;
            if (keys['a'] || keys['arrowleft']) car.position.x -= 0.4;
            if (keys['d'] || keys['arrowright']) car.position.x += 0.4;

            camera.position.set(car.position.x, car.position.y + 7, car.position.z + 15);
            camera.lookAt(car.position);

            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
